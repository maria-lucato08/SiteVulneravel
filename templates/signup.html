<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SecureHub - Cadastro</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-slate-50 via-violet-50 to-blue-50 flex items-center justify-center p-4"
  >
    <!-- BACKGROUND -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div
        class="absolute -top-40 -left-40 w-80 h-80 bg-gradient-to-br from-violet-400/20 to-blue-400/20 rounded-full blur-3xl"
      ></div>
      <div
        class="absolute -bottom-40 -right-40 w-80 h-80 bg-gradient-to-tr from-blue-400/20 to-violet-400/20 rounded-full blur-3xl"
      ></div>
    </div>

    <div class="w-full max-w-md relative">
      <!-- LOGO -->
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-600 to-blue-600 mb-4"
        >
          <span class="text-2xl font-bold text-white">S</span>
        </div>

        <h1
          class="text-2xl font-bold bg-gradient-to-r from-violet-600 to-blue-600 bg-clip-text text-transparent"
        >
          SecureHub
        </h1>
      </div>

      <!-- CARD -->
      <div
        class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl border p-8"
      >
        <div class="text-center mb-8">
          <h2 class="text-2xl font-semibold text-slate-800">Crie sua conta</h2>

          <p class="text-slate-500 mt-2">Comece sua jornada conosco</p>
        </div>

        <form id="signupForm" class="space-y-5">
          <!-- NOME -->
          <div class="space-y-2">
            <label for="name" class="text-sm font-medium text-slate-700">
              Nome completo
            </label>

            <input
              id="name"
              type="text"
              placeholder="Seu nome"
              class="w-full h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:border-violet-500 outline-none"
              required
            />
          </div>

          <!-- EMAIL -->
          <div class="space-y-2">
            <label for="email" class="text-sm font-medium text-slate-700">
              Email
            </label>

            <input
              id="email"
              type="email"
              placeholder="seu@email.com"
              class="w-full h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:border-violet-500 outline-none"
              required
            />
          </div>

          <!-- SENHA -->
          <div class="space-y-2">
            <label for="password" class="text-sm font-medium text-slate-700">
              Senha
            </label>

            <input
              id="password"
              type="password"
              placeholder="••••••••"
              class="w-full h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:border-violet-500 outline-none"
              required
            />
          </div>

          <!-- CONFIRMAR SENHA -->
          <div class="space-y-2">
            <label
              for="confirmPassword"
              class="text-sm font-medium text-slate-700"
            >
              Confirmar senha
            </label>

            <input
              id="confirmPassword"
              type="password"
              placeholder="••••••••"
              class="w-full h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:border-violet-500 outline-none"
              required
            />
          </div>

          <!-- BOTÃO -->
          <button
            type="submit"
            class="w-full h-12 bg-gradient-to-r from-violet-600 to-blue-600 text-white font-semibold rounded-xl hover:opacity-90"
          >
            Cadastrar
          </button>
        </form>

        <p class="text-center text-slate-600 mt-6">
          Já tem conta?
          <a
            href="login"
            class="font-semibold text-violet-600 hover:underline"
          >
            Fazer login
          </a>
        </p>
      </div>
    </div>

    <script>
      document
        .getElementById("signupForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const password = document.getElementById("password").value;
          const confirm = document.getElementById("confirmPassword").value;

          if (password !== confirm) {
            alert("As senhas não coincidem");

            return;
          }

          alert("Conta criada com sucesso!");
        });
    </script>
  </body>
</html>
