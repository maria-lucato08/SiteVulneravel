<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SecureHub - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-violet-50 flex items-center justify-center p-4"
  >
    <!-- BACKGROUND BLOBS -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div
        class="absolute -top-40 -right-40 w-80 h-80 bg-gradient-to-br from-blue-400/20 to-violet-400/20 rounded-full blur-3xl"
      ></div>
      <div
        class="absolute -bottom-40 -left-40 w-80 h-80 bg-gradient-to-tr from-violet-400/20 to-blue-400/20 rounded-full blur-3xl"
      ></div>
    </div>

    <div class="w-full max-w-md relative">
      <!-- LOGO -->
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-violet-600 mb-4"
        >
          <span class="text-2xl font-bold text-white">S</span>
        </div>

        <h1
          class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-violet-600 bg-clip-text text-transparent"
        >
          SecureHub
        </h1>
      </div>

      <!-- LOGIN CARD -->
      <div
        class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl border p-8"
      >
        <div class="text-center mb-8">
          <h2 class="text-2xl font-semibold text-slate-800">Login</h2>
          <p class="text-slate-500 mt-2">Entre na sua conta para continuar</p>
        </div>

        <form id="loginForm" class="space-y-5">
          <!-- EMAIL -->
          <div class="space-y-2">
            <label for="email" class="text-sm font-medium text-slate-700">
              Email
            </label>

            <input
              id="email"
              type="email"
              placeholder="seu@email.com"
              class="w-full h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:border-blue-500 outline-none"
              required
            />
          </div>

          <!-- SENHA -->
          <div class="space-y-2">
            <div class="flex justify-between">
              <label for="password" class="text-sm font-medium text-slate-700">
                Senha
              </label>

              <a href="#" class="text-sm text-blue-600 hover:underline">
                Esqueceu sua senha?
              </a>
            </div>

            <input
              id="password"
              type="password"
              placeholder="••••••••"
              class="w-full h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 focus:border-blue-500 outline-none"
              required
            />
          </div>

          <!-- LOGIN BUTTON -->
          <button
            type="submit"
            class="w-full h-12 bg-gradient-to-r from-blue-600 to-violet-600 text-white font-semibold rounded-xl hover:opacity-90"
          >
            Entrar
          </button>
        </form>

        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t"></div>
          </div>

          <div class="relative flex justify-center text-sm">
            <span class="bg-white px-4 text-slate-500"> ou </span>
          </div>
        </div>

        <a href="{{url_for('signup_route.signup')}}">
          <button
            class="w-full h-12 border-2 border-slate-200 rounded-xl font-semibold hover:border-blue-300 hover:bg-blue-50"
          >
            Criar conta
          </button>
        </a>
      </div>

      <p class="text-center text-sm text-slate-500 mt-6">
        Ao continuar, você concorda com nossos
        <a href="#" class="text-blue-600 hover:underline">Termos</a>
        e
        <a href="#" class="text-blue-600 hover:underline">Política</a>
      </p>
    </div>
  </body>
</html>
